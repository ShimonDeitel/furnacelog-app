name: FurnaceLog
options:
  bundleIdPrefix: com.shimondeitel.furnacelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FurnaceLog:
    type: application
    platform: iOS
    sources:
      - path: FurnaceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FurnaceLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurnaceLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurnaceLogTests
      - path: FurnaceLog.storekit
    dependencies:
      - target: FurnaceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurnaceLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurnaceLogUITests
    dependencies:
      - target: FurnaceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FurnaceLog:
    build:
      targets:
        FurnaceLog: all
        FurnaceLogTests: [test]
        FurnaceLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FurnaceLog.storekit
    test:
      config: Debug
      storeKitConfiguration: FurnaceLog.storekit
      targets:
        - FurnaceLogTests
        - FurnaceLogUITests
    archive:
      config: Release
